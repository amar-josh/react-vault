packages:
  - 'packages/*'
# Note: templates/* are intentionally NOT workspaces. Their package.json files
# contain placeholders ({{projectName}}) that aren't valid until the CLI
# substitutes variables at scaffold time. Treat them as files only.
# docs/ is also excluded; will be added back when Docusaurus is set up.

# Single version catalog so every package pins identical versions.
# Reference in package.json with: "react": "catalog:".
catalog:
  # --- React core ---
  react: 18.3.1
  react-dom: 18.3.1
  '@types/react': 18.3.0
  '@types/react-dom': 18.3.0

  # --- Build / language ---
  typescript: 5.4.5
  vite: 5.2.10
  '@vitejs/plugin-react-swc': 3.6.0

  # --- Styling ---
  tailwindcss: 3.4.3
  autoprefixer: 10.4.19
  postcss: 8.4.38
  'tailwindcss-animate': 1.0.7
  'class-variance-authority': 0.7.0
  clsx: 2.1.1
  'tailwind-merge': 2.3.0

  # --- Routing ---
  'react-router-dom': 6.23.0

  # --- Forms / validation ---
  'react-hook-form': 7.51.4
  '@hookform/resolvers': 3.3.4
  zod: 3.23.6

  # --- State / data ---
  '@reduxjs/toolkit': 2.2.3
  'react-redux': 9.1.2
  '@tanstack/react-query': 5.32.1
  '@tanstack/react-query-devtools': 5.32.1
  zustand: 4.5.2

  # --- HTTP ---
  axios: 1.6.8

  # --- i18n ---
  'react-i18next': 14.1.1
  i18next: 23.11.3

  # --- Utilities ---
  'date-fns': 3.6.0
  'lucide-react': 0.378.0

  # --- Testing ---
  vitest: 1.6.0
  '@vitest/coverage-v8': 1.6.0
  '@testing-library/react': 15.0.6
  '@testing-library/jest-dom': 6.4.5
  '@testing-library/user-event': 14.5.2
  jsdom: 24.0.0
  playwright: 1.43.1
  '@playwright/test': 1.43.1

  # --- Lint / format ---
  eslint: 8.57.0
  'eslint-config-prettier': 9.1.0
  'eslint-plugin-react': 7.34.1
  'eslint-plugin-react-hooks': 4.6.2
  'eslint-plugin-react-refresh': 0.4.6
  'eslint-plugin-jsx-a11y': 6.8.0
  '@typescript-eslint/eslint-plugin': 7.8.0
  '@typescript-eslint/parser': 7.8.0
  prettier: 3.2.5

  # --- CLI tooling ---
  '@clack/prompts': 0.7.0
  picocolors: 1.0.0
  'fs-extra': 11.2.0
  '@types/fs-extra': 11.0.4
  commander: 12.0.0
  execa: 9.0.2
